<div *ngIf="selectedTrip" class="card mb-4">
  <div class="card-body">
    <h4 class="card-title">Edit Trip</h4>

    <div class="mb-3">
      <label class="form-label">Name</label>
      <input class="form-control" [(ngModel)]="selectedTrip.name" />
    </div>

    <div class="mb-3">
      <label class="form-label">Code</label>
      <input class="form-control" [(ngModel)]="selectedTrip.code" />
    </div>

    <div class="mb-3">
      <label class="form-label">Length</label>
      <input class="form-control" [(ngModel)]="selectedTrip.length" />
    </div>

    <div class="mb-3">
      <label class="form-label">Start</label>
      <input class="form-control" [(ngModel)]="selectedTrip.start" />
    </div>

    <div class="mb-3">
      <label class="form-label">Resort</label>
      <input class="form-control" [(ngModel)]="selectedTrip.resort" />
    </div>

    <div class="mb-3">
      <label class="form-label">Price</label>
      <input class="form-control" [(ngModel)]="selectedTrip.perPerson" />
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <textarea class="form-control" rows="3" [(ngModel)]="selectedTrip.description"></textarea>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-success" (click)="saveTrip()">Save</button>
      <button class="btn btn-secondary" (click)="cancelEdit()">Cancel</button>
    </div>
  </div>
</div>

<div *ngFor="let trip of trips">
  <app-trip-card 
    [trip]="trip" 
    (editTrip)="editTrip($event)">
  </app-trip-card>
</div>
